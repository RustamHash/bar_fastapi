# Локальная разработка: hot reload бэкенда, SQLite в ./backend/beerpub.db
# Файл не используется на сервере (деплой через git pull, override остаётся только локально).
services:
  backend:
    volumes:
      - ./backend:/app
      - beerpub_data:/app/data
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./beerpub.db}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
