name: Deploy BeerPub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy BeerPub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /data/projects/bar_fastapi

            echo "=== Git pull ==="
            git pull origin main

            echo "=== Docker build ==="
            docker compose -f docker-compose.yml build --no-cache

            echo "=== Docker up ==="
            docker compose -f docker-compose.yml up -d --force-recreate
            docker compose -f docker-compose.yml ps

            echo "=== Traefik config ==="
            if [ -d /data/traefik/dynamic ]; then
              sudo cp deploy/beerpub.yml /data/traefik/dynamic/
              echo "Traefik config updated"
            else
              echo "WARNING: /data/traefik/dynamic not found, skipping"
            fi

            echo "=== Systemd restart ==="
            if [ -f /etc/systemd/system/beerpub-backend.service ]; then
              sudo systemctl daemon-reload
              sudo systemctl restart beerpub-backend
              sudo systemctl status beerpub-backend --no-pager || true
            else
              echo "WARNING: beerpub-backend.service not installed"
              echo "Run: sudo cp deploy/beerpub-backend.service /etc/systemd/system/"
              echo "     sudo systemctl daemon-reload && sudo systemctl enable --now beerpub-backend"
            fi

            echo "=== Deploy complete ==="
