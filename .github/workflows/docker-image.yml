# .github/workflows/deploy.yml
name: Deploy BeerPub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy BeerPub
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy to deployment directory
        run: |
          set -e
          DEPLOY_DIR="/data/projects/bar_fastapi"
          echo "Создание директории для деплоя..."
          sudo mkdir -p "$DEPLOY_DIR" || true
          sudo chown -R "$USER:$USER" "$DEPLOY_DIR" || true
          echo "Копирование файлов..."
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='node_modules' \
            --exclude='logs' \
            "${{ github.workspace }}/" "$DEPLOY_DIR/"
          echo "Проверка содержимого..."
          ls -la "$DEPLOY_DIR"

      - name: Docker compose build and restart
        working-directory: /data/projects/bar_fastapi
        run: |
          set -e
          docker compose build --no-cache
          docker compose up -d --force-recreate
          docker compose ps

      - name: Restart systemd service
        run: |
          if [ -f /etc/systemd/system/beerpub-backend.service ]; then
            sudo systemctl daemon-reload
            sudo systemctl restart beerpub-backend
            sudo systemctl status beerpub-backend --no-pager || true
          else
            echo "Unit beerpub-backend не найден. Установи вручную:"
            echo "sudo cp /data/projects/bar_fastapi/deploy/beerpub-backend.service /etc/systemd/system/"
            echo "sudo systemctl daemon-reload"
            echo "sudo systemctl enable --now beerpub-backend"
          fi

      - name: Copy Traefik config
        run: |
          if [ -d /data/traefik/dynamic ]; then
            sudo cp /data/projects/bar_fastapi/deploy/beerpub.yml /data/traefik/dynamic/
            echo "Traefik config updated"
          else
            echo "/data/traefik/dynamic не найден — пропускаем"
          fi
