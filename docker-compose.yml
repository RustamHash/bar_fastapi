# Продакшен и локальная база: SQLite (файл в volume data/).
# Локально docker compose автоматически подхватывает docker-compose.override.yml.
services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/beerpub.db}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - beerpub_data:/app/data
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  beerpub_data:
